<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI">
  <defs>
    <pattern id="aiDots" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#1F1F1F"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="#0A0A0A"/>
  <rect width="400" height="400" fill="url(#aiDots)"/>

  <!-- corner brackets -->
  <g fill="#F5F5F5">
    <rect x="20" y="20" width="28" height="2"/>
    <rect x="20" y="20" width="2" height="28"/>
    <rect x="352" y="20" width="28" height="2"/>
    <rect x="378" y="20" width="2" height="28"/>
    <rect x="20" y="378" width="28" height="2"/>
    <rect x="20" y="352" width="2" height="28"/>
    <rect x="352" y="378" width="28" height="2"/>
    <rect x="378" y="352" width="2" height="28"/>
  </g>

  <!-- index + title -->
  <text x="36" y="62" fill="#888888" font-family="'Courier New', Menlo, monospace" font-size="11" letter-spacing="3">[ 01 ]</text>
  <text x="36" y="100" fill="#F5F5F5" font-family="'Courier New', Menlo, monospace" font-size="32" font-weight="700" letter-spacing="4">AI</text>
  <rect x="36" y="112" width="40" height="2" fill="#F5F5F5"/>

  <!-- neural network visualization -->
  <g transform="translate(80, 170)">
    <!-- connections -->
    <g stroke="#F5F5F5" stroke-width="1" opacity="0.25">
      <line x1="14" y1="7" x2="120" y2="-25"/>
      <line x1="14" y1="7" x2="120" y2="15"/>
      <line x1="14" y1="7" x2="120" y2="55"/>
      <line x1="14" y1="7" x2="120" y2="95"/>
      <line x1="14" y1="7" x2="120" y2="135"/>

      <line x1="14" y1="57" x2="120" y2="-25"/>
      <line x1="14" y1="57" x2="120" y2="15"/>
      <line x1="14" y1="57" x2="120" y2="55"/>
      <line x1="14" y1="57" x2="120" y2="95"/>
      <line x1="14" y1="57" x2="120" y2="135"/>

      <line x1="14" y1="107" x2="120" y2="-25"/>
      <line x1="14" y1="107" x2="120" y2="15"/>
      <line x1="14" y1="107" x2="120" y2="55"/>
      <line x1="14" y1="107" x2="120" y2="95"/>
      <line x1="14" y1="107" x2="120" y2="135"/>

      <line x1="134" y1="-18" x2="240" y2="35"/>
      <line x1="134" y1="-18" x2="240" y2="85"/>
      <line x1="134" y1="22" x2="240" y2="35"/>
      <line x1="134" y1="22" x2="240" y2="85"/>
      <line x1="134" y1="62" x2="240" y2="35"/>
      <line x1="134" y1="62" x2="240" y2="85"/>
      <line x1="134" y1="102" x2="240" y2="35"/>
      <line x1="134" y1="102" x2="240" y2="85"/>
      <line x1="134" y1="142" x2="240" y2="35"/>
      <line x1="134" y1="142" x2="240" y2="85"/>
    </g>

    <!-- nodes (pixel squares) -->
    <g fill="#F5F5F5">
      <rect x="0" y="0" width="14" height="14"/>
      <rect x="0" y="50" width="14" height="14"/>
      <rect x="0" y="100" width="14" height="14"/>

      <rect x="120" y="-25" width="14" height="14"/>
      <rect x="120" y="15" width="14" height="14"/>
      <rect x="120" y="55" width="14" height="14"/>
      <rect x="120" y="95" width="14" height="14"/>
      <rect x="120" y="135" width="14" height="14"/>

      <rect x="240" y="28" width="14" height="14"/>
      <rect x="240" y="78" width="14" height="14"/>
    </g>
  </g>

  <!-- caption -->
  <text x="36" y="356" fill="#666666" font-family="'Courier New', Menlo, monospace" font-size="10" letter-spacing="3">MACHINE LEARNING · MODELS · TRAINING</text>
</svg>
