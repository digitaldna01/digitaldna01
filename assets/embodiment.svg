<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Embodiment">
  <defs>
    <pattern id="embDots" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#1F1F1F"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="#0A0A0A"/>
  <rect width="400" height="400" fill="url(#embDots)"/>

  <!-- corner brackets -->
  <g fill="#F5F5F5">
    <rect x="20" y="20" width="28" height="2"/>
    <rect x="20" y="20" width="2" height="28"/>
    <rect x="352" y="20" width="28" height="2"/>
    <rect x="378" y="20" width="2" height="28"/>
    <rect x="20" y="378" width="28" height="2"/>
    <rect x="20" y="352" width="2" height="28"/>
    <rect x="352" y="378" width="28" height="2"/>
    <rect x="378" y="352" width="2" height="28"/>
  </g>

  <!-- index + title -->
  <text x="36" y="62" fill="#888888" font-family="'Courier New', Menlo, monospace" font-size="11" letter-spacing="3">[ 02 ]</text>
  <text x="36" y="100" fill="#F5F5F5" font-family="'Courier New', Menlo, monospace" font-size="32" font-weight="700" letter-spacing="4">EMBODIMENT</text>
  <rect x="36" y="112" width="40" height="2" fill="#F5F5F5"/>

  <!-- pixel humanoid figure (centered around x=200, y=240) -->
  <g fill="#F5F5F5">
    <!-- head -->
    <rect x="184" y="150" width="32" height="8"/>
    <rect x="176" y="158" width="48" height="8"/>
    <rect x="168" y="166" width="64" height="8"/>
    <rect x="168" y="174" width="64" height="8"/>
    <rect x="168" y="182" width="64" height="8"/>
    <rect x="176" y="190" width="48" height="8"/>
    <rect x="184" y="198" width="32" height="8"/>

    <!-- eyes (negative) -->
  </g>
  <g fill="#0A0A0A">
    <rect x="184" y="172" width="8" height="8"/>
    <rect x="208" y="172" width="8" height="8"/>
  </g>

  <!-- neck + body -->
  <g fill="#F5F5F5">
    <rect x="192" y="206" width="16" height="8"/>
    <rect x="160" y="214" width="80" height="8"/>
    <rect x="152" y="222" width="96" height="8"/>
    <rect x="152" y="230" width="96" height="8"/>
    <rect x="152" y="238" width="96" height="8"/>
    <rect x="160" y="246" width="80" height="8"/>
    <rect x="168" y="254" width="64" height="8"/>
  </g>

  <!-- ripple/aura ring (pixel dashes) -->
  <g fill="#F5F5F5" opacity="0.5">
    <!-- outer ripple top -->
    <rect x="80"  y="288" width="8" height="2"/>
    <rect x="100" y="290" width="8" height="2"/>
    <rect x="120" y="292" width="8" height="2"/>
    <rect x="140" y="294" width="8" height="2"/>
    <rect x="252" y="294" width="8" height="2"/>
    <rect x="272" y="292" width="8" height="2"/>
    <rect x="292" y="290" width="8" height="2"/>
    <rect x="312" y="288" width="8" height="2"/>
  </g>
  <g fill="#F5F5F5" opacity="0.3">
    <rect x="60"  y="298" width="8" height="2"/>
    <rect x="84"  y="300" width="8" height="2"/>
    <rect x="108" y="302" width="8" height="2"/>
    <rect x="284" y="302" width="8" height="2"/>
    <rect x="308" y="300" width="8" height="2"/>
    <rect x="332" y="298" width="8" height="2"/>
  </g>

  <!-- floating dots (sensors / motion cues) -->
  <g fill="#F5F5F5">
    <rect x="92"  y="180" width="3" height="3"/>
    <rect x="120" y="140" width="3" height="3"/>
    <rect x="300" y="160" width="3" height="3"/>
    <rect x="320" y="200" width="3" height="3"/>
    <rect x="80"  y="240" width="3" height="3"/>
    <rect x="316" y="240" width="3" height="3"/>
  </g>

  <!-- caption -->
  <text x="36" y="356" fill="#666666" font-family="'Courier New', Menlo, monospace" font-size="10" letter-spacing="3">ROBOTICS · MOTION · PERCEPTION</text>
</svg>
