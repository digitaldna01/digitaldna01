  <text x="36" y="100" fill="#F5F5F5" font-family="'Courier New', Menlo, monospace" font-size="32" font-weight="700" letter-spacing="4">QUANTUM</text>
  <rect x="36" y="112" width="40" height="2" fill="#F5F5F5"/>

