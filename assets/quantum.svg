  <text x="200" y="340" fill="#F5F5F5" font-family="'Courier New', Menlo, monospace" font-size="14" font-weight="700" text-anchor="middle">|1⟩</text>

  <!-- caption -->
  <text x="36" y="356" fill="#666666" font-family="'Courier New', Menlo, monospace" font-size="10" letter-spacing="3">QUBITS · SIMULATION · SUPERPOSITION</text>
