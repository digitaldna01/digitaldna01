<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Quantum">
  <defs>
    <pattern id="qDots" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#1F1F1F"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="#0A0A0A"/>
  <rect width="400" height="400" fill="url(#qDots)"/>

  <!-- corner brackets -->
  <g fill="#F5F5F5">
