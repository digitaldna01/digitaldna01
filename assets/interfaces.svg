<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interfaces">
  <defs>
    <pattern id="iDots" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="#1F1F1F"/>
    </pattern>
  </defs>

  <rect width="400" height="400" fill="#0A0A0A"/>
  <rect width="400" height="400" fill="url(#iDots)"/>

  <!-- corner brackets -->
  <g fill="#F5F5F5">
    <rect x="20" y="20" width="28" height="2"/>
    <rect x="20" y="20" width="2" height="28"/>
    <rect x="352" y="20" width="28" height="2"/>
    <rect x="378" y="20" width="2" height="28"/>
    <rect x="20" y="378" width="28" height="2"/>
    <rect x="20" y="352" width="2" height="28"/>
    <rect x="352" y="378" width="28" height="2"/>
    <rect x="378" y="352" width="2" height="28"/>
  </g>

  <!-- index + title -->
  <text x="36" y="62" fill="#888888" font-family="'Courier New', Menlo, monospace" font-size="11" letter-spacing="3">[ 04 ]</text>
  <text x="36" y="100" fill="#F5F5F5" font-family="'Courier New', Menlo, monospace" font-size="32" font-weight="700" letter-spacing="4">INTERFACES</text>
  <rect x="36" y="112" width="40" height="2" fill="#F5F5F5"/>

  <!-- pixel UI window -->
  <g>
    <!-- window outline -->
    <rect x="68" y="160" width="232" height="160" fill="none" stroke="#F5F5F5" stroke-width="2"/>
    <!-- title bar -->
    <rect x="68" y="160" width="232" height="22" fill="#F5F5F5"/>
    <!-- traffic lights as black squares on white bar -->
    <rect x="78" y="167" width="8" height="8" fill="#0A0A0A"/>
    <rect x="92" y="167" width="8" height="8" fill="#0A0A0A"/>
    <rect x="106" y="167" width="8" height="8" fill="#0A0A0A"/>
    <!-- window title -->
    <text x="184" y="176" fill="#0A0A0A" font-family="'Courier New', Menlo, monospace" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="2">~/PROTOTYPE</text>
  </g>

  <!-- content lines (mock UI) -->
  <g fill="#F5F5F5">
    <!-- line 1 -->
    <rect x="84"  y="200" width="6" height="6"/>
    <rect x="96"  y="202" width="80" height="2"/>
    <!-- line 2 -->
    <rect x="84"  y="218" width="6" height="6"/>
    <rect x="96"  y="220" width="120" height="2"/>
    <!-- line 3 -->
    <rect x="84"  y="236" width="6" height="6"/>
    <rect x="96"  y="238" width="60" height="2"/>
  </g>

  <!-- buttons -->
  <g>
    <rect x="84" y="262" width="68" height="22" fill="none" stroke="#F5F5F5" stroke-width="2"/>
    <text x="118" y="277" fill="#F5F5F5" font-family="'Courier New', Menlo, monospace" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="2">RUN</text>

    <rect x="160" y="262" width="68" height="22" fill="#F5F5F5"/>
    <text x="194" y="277" fill="#0A0A0A" font-family="'Courier New', Menlo, monospace" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="2">SHIP</text>
  </g>

  <!-- pixel cursor arrow (overlapping window) -->
  <g fill="#F5F5F5">
    <rect x="248" y="280" width="2" height="2"/>
    <rect x="248" y="282" width="4" height="2"/>
    <rect x="248" y="284" width="6" height="2"/>
    <rect x="248" y="286" width="8" height="2"/>
    <rect x="248" y="288" width="10" height="2"/>
    <rect x="248" y="290" width="12" height="2"/>
    <rect x="248" y="292" width="6" height="2"/>
    <rect x="252" y="294" width="4" height="2"/>
    <rect x="254" y="296" width="4" height="2"/>
    <rect x="256" y="298" width="2" height="2"/>
  </g>
  <g fill="#0A0A0A">
    <rect x="250" y="284" width="2" height="2"/>
    <rect x="250" y="286" width="4" height="2"/>
    <rect x="250" y="288" width="6" height="2"/>
    <rect x="250" y="290" width="2" height="2"/>
  </g>

  <!-- caption -->
  <text x="36" y="356" fill="#666666" font-family="'Courier New', Menlo, monospace" font-size="10" letter-spacing="3">DESIGN · INTERACTION · PROTOTYPE</text>
</svg>
